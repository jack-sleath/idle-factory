name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages on every push to main.
# The site is served under /idle-factory/ (see vite.config.ts `base`), which the
# PWA manifest scope/start_url and all asset URLs already resolve against.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, and mint the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `build` runs `tsc --noEmit && vite build`, so a type error fails the deploy.
      - run: npm run build
      # `enablement: true` turns on GitHub Pages (with Actions as the source) on
      # the first run, so no manual repo-settings step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
